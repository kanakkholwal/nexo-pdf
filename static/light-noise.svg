<svg id="noice">
    <filter id="noise-filter">
        <feTurbulence type="fractalNoise" baseFrequency="1.34" numOctaves="4.639999999999987" stitchTiles="stitch"></feTurbulence>
        <feColorMatrix type="saturate" values="0"></feColorMatrix>
        <feComponentTransfer>
            <feFuncR type="linear" slope="0.22"></feFuncR>
            <feFuncG type="linear" slope="0.22"></feFuncG>
            <feFuncB type="linear" slope="0.22"></feFuncB>
            <feFuncA type="linear" slope="0.63"></feFuncA>
        </feComponentTransfer>
        <feComponentTransfer>
            <feFuncR type="linear" slope="3" intercept="-1.00"/>
            <feFuncG type="linear" slope="3" intercept="-1.00"/>
            <feFuncB type="linear" slope="3" intercept="-1.00"/>
        </feComponentTransfer>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise-filter)"></rect>
</svg>