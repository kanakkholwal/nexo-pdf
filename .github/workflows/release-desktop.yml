name: Release Desktop App
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
env:
  NODE_ENV: production
  # for web platform only, No tracking in desktop app, but these env vars are required by the frontend code, so we set them to empty strings
  PUBLIC_ADSENSE_PUBLISHER_ID: ""
  PUBLIC_GOOGLE_ANALYTICS_ID: ""

jobs:
  # Pre-create the release with auto-generated notes (commits + PRs since the
  # previous tag), prefixed by a minimal header. Subsequent platform jobs only
  # attach assets — they don't rewrite the body.
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          GENERATED=$(gh api \
            repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq .body)

          {
            echo "Privacy-first PDF toolkit. Runs entirely on your device."
            echo
            echo "**Downloads** — Windows: \`.msi\` · \`.exe\` · \`.msixbundle\`  •  macOS: \`.dmg\`  •  Linux: \`.AppImage\` · \`.deb\` · \`.rpm\`"
            echo
            echo "$GENERATED"
          } > release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Orbit PDF $TAG" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title "Orbit PDF $TAG" \
              --notes-file release-notes.md
          fi

  build-windows:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Clean Rust build
        run: cd src-tauri && cargo clean

      - name: Install msixbundle-cli
        run: cargo install msixbundle-cli

      - name: Build and attach (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false

      # Cross-arch (arm64) requires adding `aarch64-pc-windows-msvc` to the
      # tauri-action above; for now we ship x64 only.
      #
      # msixbundle-cli expects unpacked AppxContent directories per arch, not
      # the single .msix that tauri produces. So we locate the tauri-built
      # .msix, unpack it with makeappx (from the Windows 10 SDK), then bundle.
      - name: Build MSIX bundle
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path src-tauri/target/release/bundle/msix -Filter *.msix -Recurse | Select-Object -First 1
          if (-not $msix) { Write-Error "No .msix produced by tauri-action"; exit 1 }
          Write-Host "Found MSIX: $($msix.FullName)"

          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter makeappx.exe -Recurse |
            Where-Object { $_.FullName -match '\\x64\\makeappx.exe$' } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) { Write-Error "makeappx.exe not found in Windows 10 SDK"; exit 1 }
          Write-Host "Using makeappx: $($makeappx.FullName)"

          $unpackDir = "src-tauri/target/msix-unpack/x64"
          New-Item -ItemType Directory -Force -Path $unpackDir | Out-Null
          & $makeappx.FullName unpack /p $msix.FullName /d $unpackDir /o
          if ($LASTEXITCODE -ne 0) { Write-Error "makeappx unpack failed"; exit $LASTEXITCODE }

          $outDir = "src-tauri/target/msix"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          msixbundle-cli --out-dir $outDir --dir-x64 $unpackDir
          if ($LASTEXITCODE -ne 0) { Write-Error "msixbundle-cli failed"; exit $LASTEXITCODE }

      - name: Attach MSIX to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          $bundles = Get-ChildItem -Path src-tauri/target/msix -Filter *.msixbundle -Recurse
          if (-not $bundles) {
            Write-Error "No .msixbundle artifacts found"
            exit 1
          }
          foreach ($b in $bundles) {
            gh release upload $env:TAG "$($b.FullName)" --clobber
          }
        shell: pwsh

      - name: Upload MSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-bundle
          path: src-tauri/target/msix/*.msixbundle
          if-no-files-found: error

  build-linux:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev
      - name: Clean Rust build
        run: cd src-tauri && cargo clean
      - name: Build and attach (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false

  build-macos:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Clean Rust build
        run: cd src-tauri && cargo clean
      - name: Build and attach (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false
