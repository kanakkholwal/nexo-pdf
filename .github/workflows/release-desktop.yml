name: Release Desktop App
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
env:
  NODE_ENV: production
  # for web platform only, No tracking in desktop app, but these env vars are required by the frontend code, so we set them to empty strings
  PUBLIC_ADSENSE_PUBLISHER_ID: ""
  PUBLIC_GOOGLE_ANALYTICS_ID: ""

jobs:
  # Pre-create the release with auto-generated notes (commits + PRs since the
  # previous tag), prefixed by a minimal header. Subsequent platform jobs only
  # attach assets — they don't rewrite the body.
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          GENERATED=$(gh api \
            repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq .body)

          {
            echo "Privacy-first PDF toolkit. Runs entirely on your device."
            echo
            echo "**Downloads** — Windows: \`.msi\` · \`.exe\` · \`.msixbundle\`  •  macOS: \`.dmg\`  •  Linux: \`.AppImage\` · \`.deb\` · \`.rpm\`"
            echo
            echo "$GENERATED"
          } > release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Orbit PDF $TAG" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title "Orbit PDF $TAG" \
              --notes-file release-notes.md
          fi

  build-windows:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Clean Rust build
        run: cd src-tauri && cargo clean

      - name: Build and attach (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false

      # Tauri v2 has no MSIX target, so we package it ourselves using
      # makeappx.exe + signtool.exe from the Windows 10 SDK (already on the
      # runner — no third-party tool needed). Signing is optional: set the
      # WINDOWS_PFX_BASE64 / WINDOWS_PFX_PASSWORD secrets to produce a
      # signed bundle, otherwise an unsigned .msixbundle is produced.
      - name: Stage and pack MSIX bundle
        shell: pwsh
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          # Locate makeappx + signtool from the latest installed Windows 10 SDK
          $sdkBin = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdkBin) { Write-Error "Windows 10 SDK not found"; exit 1 }
          $makeappx = Join-Path $sdkBin.FullName "x64\makeappx.exe"
          $signtool = Join-Path $sdkBin.FullName "x64\signtool.exe"
          if (-not (Test-Path $makeappx)) { Write-Error "makeappx.exe missing at $makeappx"; exit 1 }
          Write-Host "makeappx: $makeappx"

          # Tag like "v0.1.6-v2" -> AppX 4-part numeric version "0.1.6.0".
          # AppX requires each segment to be 0..65535 with no suffix, so we
          # strip any "-prerelease" tail and any non-digit chars per segment.
          $raw = $env:TAG -replace '^v',''
          $core = ($raw -split '[-+]')[0]
          $parts = @($core.Split('.') | ForEach-Object { ($_ -replace '\D','') })
          $parts = @($parts | ForEach-Object { if ($_ -eq '') { '0' } else { $_ } })
          while ($parts.Count -lt 4) { $parts += '0' }
          $appxVersion = ($parts[0..3] -join '.')
          Write-Host "AppX version: $appxVersion (from tag $($env:TAG))"

          $exe = Get-ChildItem -Path src-tauri/target/release -Filter orbit.exe -File | Select-Object -First 1
          if (-not $exe) { Write-Error "orbit.exe not found in src-tauri/target/release"; exit 1 }

          $stage = "src-tauri/target/msix-stage/x64"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path "$stage/Assets" | Out-Null

          Copy-Item $exe.FullName "$stage/orbit.exe"
          $iconSrc = "src-tauri/icons"
          foreach ($asset in @(
            'StoreLogo.png',
            'Square44x44Logo.png',
            'Square71x71Logo.png',
            'Square150x150Logo.png',
            'Square310x310Logo.png'
          )) {
            Copy-Item "$iconSrc/$asset" "$stage/Assets/$asset"
          }

          $manifest = Get-Content -Raw -Path src-tauri/msix/AppxManifest.xml.tmpl
          $manifest = $manifest.Replace('__VERSION__', $appxVersion)
          Set-Content -Path "$stage/AppxManifest.xml" -Value $manifest -Encoding UTF8

          $outDir = "src-tauri/target/msix"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $msixPath   = Join-Path $outDir "OrbitPDF-$raw-x64.msix"
          $bundlePath = Join-Path $outDir "OrbitPDF-$raw.msixbundle"

          # Pack the staged content into a per-arch .msix
          & $makeappx pack /d $stage /p $msixPath /o
          if ($LASTEXITCODE -ne 0) { Write-Error "makeappx pack failed"; exit $LASTEXITCODE }

          # Bundle the per-arch packages into a .msixbundle
          $bundleStage = "src-tauri/target/msix-bundle-stage"
          if (Test-Path $bundleStage) { Remove-Item -Recurse -Force $bundleStage }
          New-Item -ItemType Directory -Force -Path $bundleStage | Out-Null
          Copy-Item $msixPath $bundleStage
          & $makeappx bundle /d $bundleStage /p $bundlePath /bv $appxVersion /o
          if ($LASTEXITCODE -ne 0) { Write-Error "makeappx bundle failed"; exit $LASTEXITCODE }

          # Optional signing — both .msix and .msixbundle if a PFX is provided
          if ($env:WINDOWS_PFX_BASE64 -and $env:WINDOWS_PFX_PASSWORD) {
            $pfxDir = "src-tauri/target/msix-stage"
            New-Item -ItemType Directory -Force -Path $pfxDir | Out-Null
            $pfxPath = Join-Path (Resolve-Path $pfxDir).Path "signing.pfx"
            [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            foreach ($p in @($msixPath, $bundlePath)) {
              & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:WINDOWS_PFX_PASSWORD $p
              if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed on $p"; exit $LASTEXITCODE }
            }
            Write-Host "Signed .msix and .msixbundle"
          } else {
            Write-Host "WINDOWS_PFX_BASE64 not set — producing unsigned outputs"
          }

          Get-ChildItem -Path $outDir | Format-Table -AutoSize

      - name: Attach MSIX bundle to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          $bundles = Get-ChildItem -Path src-tauri/target/msix -Filter *.msixbundle -Recurse
          if (-not $bundles) { Write-Error "No .msixbundle artifacts found"; exit 1 }
          foreach ($b in $bundles) {
            gh release upload $env:TAG "$($b.FullName)" --clobber
          }

      - name: Upload MSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-bundle
          path: src-tauri/target/msix/*.msixbundle
          if-no-files-found: error

  build-linux:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev
      - name: Clean Rust build
        run: cd src-tauri && cargo clean
      - name: Build and attach (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false

  build-macos:
    needs: prepare-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Clean Rust build
        run: cd src-tauri && cargo clean
      - name: Build and attach (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: "Orbit PDF ${{ needs.prepare-release.outputs.tag }}"
          releaseDraft: false
          prerelease: false
